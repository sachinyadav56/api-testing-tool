<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings - API Tool</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="admin-page-wrapper">
    <div class="admin-container">

        <div class="page-topbar">
            <div>
                <h1>Admin Settings</h1>
                <p>Manage admin profile and password</p>
            </div>

            <div class="topbar-actions">
                <button id="themeToggle" class="theme-btn">☀ Light</button>
                <a href="/admin.html" class="back-btn">← Admin Panel</a>
            </div>
        </div>

        <section class="stats-grid">
            <div class="stat-box">
                <h3>Username</h3>
                <p id="adminSettingsUsername">-</p>
            </div>

            <div class="stat-box">
                <h3>Email</h3>
                <p id="adminSettingsEmail">-</p>
            </div>

            <div class="stat-box">
                <h3>Role</h3>
                <p>Admin</p>
            </div>

            <div class="stat-box">
                <h3>Status</h3>
                <p>Active</p>
            </div>
        </section>

        <div class="main-grid">
            <section class="card">
                <h2>Update Admin Profile</h2>

                <label for="adminUsername">Username</label>
                <input type="text" id="adminUsername" placeholder="Enter username">

                <label for="adminEmail">Email</label>
                <input type="email" id="adminEmail" placeholder="Enter email">

                <div class="button-group" style="margin-top:16px;">
                    <button id="saveAdminProfileBtn" type="button">Save Profile</button>
                </div>
            </section>

            <section class="card">
                <h2>Change Password</h2>

                <label for="adminCurrentPassword">Current Password</label>
                <input type="password" id="adminCurrentPassword" placeholder="Enter current password">

                <label for="adminNewPassword">New Password</label>
                <input type="password" id="adminNewPassword" placeholder="Enter new password">

                <div class="button-group" style="margin-top:16px;">
                    <button id="changeAdminPasswordBtn" type="button">Change Password</button>
                </div>
            </section>
        </div>

    </div>
</div>

<script src="/theme.js"></script>
<script src="/admin-settings.js"></script>
</body>
</html>
