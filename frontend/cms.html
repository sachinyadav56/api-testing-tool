<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Pages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cms-theme"></body>
<div class="admin-page-wrapper">
    <div class="admin-container">
        <div class="page-topbar">
            <div>
                <h1>CMS Pages</h1>
                <p>Create and manage dynamic premium content pages</p>
            </div>
            <div class="topbar-actions">
                    <button id="themeToggle" class="theme-btn">☀ Light</button>
                <a href="admin.html" class="back-btn">← Dashboard</a>
            </div>
        </div>

        <section class="card">
            <h2>Create / Edit Page</h2>

            <input type="hidden" id="pageId">

            <label for="pageTitle">Title</label>
            <input type="text" id="pageTitle" placeholder="Home page">

            <label for="pageSlug">Slug</label>
            <input type="text" id="pageSlug" placeholder="home">

            <label for="pageStatus">Status</label>
            <select id="pageStatus">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
            </select>

            <div class="section-head" style="margin-top:16px;">
                <h2>Content Builder</h2>
                <div class="button-group">
                    <button type="button" id="insertHeroBtn">Insert Hero</button>
                    <button type="button" id="insertStatsBtn">Insert Stats</button>
                    <button type="button" id="insertFeaturesBtn">Insert Features</button>
                    <button type="button" id="formatJsonBtn">Format JSON</button>
                </div>
            </div>

            <label for="pageContent">Content (JSON)</label>
            <textarea id="pageContent" placeholder='{
  "sections": []
}'></textarea>

            <div class="button-group" style="margin-top:14px;">
                <button id="savePageBtn" type="button">Save Page</button>
                <button id="resetPageBtn" type="button">Reset</button>
            </div>
        </section>

        <section class="card">
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Slug</th>
                            <th>Status</th>
                            <th>Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pagesTableBody">
                        <tr>
                            <td colspan="6">Loading pages...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script src="cms.js"></script>
<script src="/theme.js"></script>

</body>
</html>
