<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Pages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="admin-page-wrapper">
    <div class="admin-container">

        <div class="page-topbar">
            <div>
                <h1>CMS Pages</h1>
                <p>Create and manage dynamic content pages</p>
            </div>

            <div class="topbar-actions">
                <button id="themeToggle" class="theme-btn">☀ Light</button>
                <a href="admin.html" class="back-btn">← Dashboard</a>
            </div>
        </div>

        <section class="card">
            <h2>Create / Edit Page</h2>

            <input type="hidden" id="pageId">

            <label for="pageTitle">Title</label>
            <input type="text" id="pageTitle" placeholder="Enter page title">

            <label for="pageSlug">Slug</label>
            <input type="text" id="pageSlug" placeholder="about-us">

            <label for="pageStatus">Status</label>
            <select id="pageStatus">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
            </select>

            <label for="pageContent">Content</label>
            <textarea id="pageContent" placeholder="Write page content..."></textarea>

            <div class="button-group">
                <button id="savePageBtn" type="button">Save Page</button>
                <button id="resetPageBtn" type="button">Reset</button>
            </div>
        </section>

        <section class="card">
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Slug</th>
                            <th>Status</th>
                            <th>Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pagesTableBody">
                        <tr>
                            <td colspan="6">Loading pages...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>
</div>

<script src="theme.js"></script>
<script src="cms.js"></script>
</body>
</html>
