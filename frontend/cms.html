<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage CMS - API Tool</title>
<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg, #020617, #06101d);
    color: #f8fafc;
}
.page-wrap {
    max-width: 1280px;
    margin: auto;
    padding: 24px;
}
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 20px 24px;
    margin-bottom: 22px;
}
.topbar h1 {
    margin: 0 0 6px;
    font-size: 28px;
}
.topbar p {
    margin: 0;
    color: #94a3b8;
}
.topbar-links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.topbar-links a,
.topbar-links button {
    text-decoration: none;
    border: none;
    background: #13203a;
    color: #f8fafc;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
}
.topbar-links a:hover,
.topbar-links button:hover {
    background: #1d4ed8;
}
.hero {
    background: linear-gradient(135deg, #0ea5e9, #14b8a6);
    border-radius: 22px;
    padding: 28px;
    margin-bottom: 22px;
}
.hero h2 {
    margin: 0 0 8px;
    font-size: 32px;
}
.hero p {
    margin: 0;
    color: rgba(255,255,255,0.92);
}
.grid {
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 18px;
}
.card {
    background: #13203a;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 20px;
}
.card h3 {
    margin: 0 0 16px;
}
label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
}
input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #0f172a;
    color: #f8fafc;
    box-sizing: border-box;
    margin-bottom: 14px;
}
textarea {
    min-height: 180px;
    resize: vertical;
}
.btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.btn {
    border: none;
    background: #06b6d4;
    color: white;
    padding: 12px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
}
.btn:hover {
    background: #0891b2;
}
.btn.secondary {
    background: #1e293b;
}
.btn.secondary:hover {
    background: #334155;
}
.table-wrap {
    overflow-x: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 14px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    vertical-align: top;
}
th {
    color: #94a3b8;
    font-size: 14px;
}
.badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
}
.badge.published {
    background: rgba(34, 197, 94, 0.14);
    color: #22c55e;
}
.badge.draft {
    background: rgba(245, 158, 11, 0.14);
    color: #fbbf24;
}
.action-btn {
    border: none;
    background: #06b6d4;
    color: white;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    margin-right: 8px;
}
.action-btn.delete {
    background: #ef4444;
}
@media (max-width: 900px) {
    .grid {
        grid-template-columns: 1fr;
    }
    .page-wrap {
        padding: 16px;
    }
}
</style>
</head>
<body>
<div class="page-wrap">
    <div class="topbar">
        <div>
            <h1>Manage CMS</h1>
            <p>Create and manage premium pages</p>
        </div>
        <div class="topbar-links">
            <button id="themeToggle">🌙 Dark</button>
            <a href="/admin.html">Dashboard</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </div>

    <section class="hero">
        <h2>Content Management</h2>
        <p>Create Home, Features, Pricing and other dynamic pages from here.</p>
    </section>

    <div class="grid">
        <section class="card">
            <h3>Create / Edit Page</h3>

            <input type="hidden" id="pageId">

            <label>Title</label>
            <input type="text" id="pageTitle" placeholder="Home">

            <label>Slug</label>
            <input type="text" id="pageSlug" placeholder="home">

            <label>Status</label>
            <select id="pageStatus">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
            </select>

            <label>Content (JSON)</label>
            <textarea id="pageContent" placeholder='{"hero":{},"cards":[]}'></textarea>

            <div class="btn-row">
                <button class="btn" id="savePageBtn">Save Page</button>
                <button class="btn secondary" id="resetPageBtn">Reset</button>
            </div>
        </section>

        <section class="card">
            <h3>All CMS Pages</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Slug</th>
                            <th>Status</th>
                            <th>Updated</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="pagesTableBody">
                        <tr><td colspan="5">Loading pages...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script src="/theme.js"></script>
<script src="/cms.js"></script>
<script>
document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = "/admin-login.html";
});
</script>
</body>
</html>
