<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - API Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <div>
                <h1>Admin Management Panel</h1>
                <p>Manage users and monitor API request activity.</p>
                <p id="adminInfo"></p>
            </div>

            <div class="header-actions">
                <button id="goTesterBtn" type="button">API Tester</button>
                <button id="logoutBtn" type="button">Logout</button>
            </div>
        </header>

        <div class="card">
            <div class="section-head">
                <h2>Dashboard</h2>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <h3>Total Users</h3>
                    <p id="statUsers">0</p>
                </div>
                <div class="stat-box">
                    <h3>Total Requests</h3>
                    <p id="statRequests">0</p>
                </div>
                <div class="stat-box">
                    <h3>Successful Requests</h3>
                    <p id="statSuccess">0</p>
                </div>
                <div class="stat-box">
                    <h3>Success Rate</h3>
                    <p id="statRate">0%</p>
                </div>
            </div>

            <canvas id="methodChart" height="110"></canvas>
        </div>

        <div class="bottom-grid">
            <div class="card">
                <div class="section-head">
                    <h2>Users</h2>
                    <button id="refreshUsersBtn" type="button">Refresh</button>
                </div>

                <div class="table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Created At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="6">Loading users...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="section-head">
                    <h2>All History</h2>
                    <button id="refreshHistoryBtn" type="button">Refresh</button>
                </div>
                <div id="historyOutput"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="admin.js"></script>
</body>
</html>
