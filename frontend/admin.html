<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <div>
            <div class="sidebar-brand">
                <h2>API Tool</h2>
                <p>Admin Panel</p>
            </div>

            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-link active">Dashboard</a>
                <a href="users.html" class="nav-link">Users</a>
                <a href="cms.html" class="nav-link">CMS</a>
                <a href="index.html" class="nav-link">API Tester</a>
            </nav>
        </div>

        <button id="logoutBtn" class="sidebar-logout">Logout</button>
    </aside>

    <main class="admin-main">
        <header class="topbar">
            <div>
                <h1>Dashboard</h1>
                <p id="adminInfo">Welcome Admin</p>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-box">
                <h3>Total Users</h3>
                <p id="statUsers">0</p>
            </div>
            <div class="stat-box">
                <h3>Total Requests</h3>
                <p id="statRequests">0</p>
            </div>
            <div class="stat-box">
                <h3>Success Requests</h3>
                <p id="statSuccess">0</p>
            </div>
            <div class="stat-box">
                <h3>Success Rate</h3>
                <p id="statRate">0%</p>
            </div>
        </section>

        <section class="card">
            <h2>Quick Overview</h2>
            <p>Total Pages: <span id="statPages">0</span></p>
            <p>Total Collections: <span id="statCollections">0</span></p>
        </section>
    </main>
</div>

<script src="admin.js"></script>
</body>
</html>
