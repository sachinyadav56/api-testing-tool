<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Plan - API Tool</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="admin-page-wrapper">
    <div class="admin-container">

        <div class="page-topbar">
            <div>
                <h1>Purchase Plan</h1>
                <p>Choose a plan and activate your subscription</p>
            </div>

            <div class="topbar-actions">
                <button id="themeToggle" class="theme-btn">☀ Light</button>
                <a href="/dashboard.html" class="back-btn">← Dashboard</a>
            </div>
        </div>

        <section class="hero-card">
            <h2 id="purchasePageTitle">Simple pricing for every workflow</h2>
            <p id="purchasePageDescription">
                Choose a plan that fits your API testing and management needs.
            </p>
        </section>

        <section id="purchasePlansGrid" class="pricing-grid">
            <div class="pricing-card">
                <h3>Loading...</h3>
                <p>Please wait while plans are loading.</p>
            </div>
        </section>

    </div>
</div>

<script src="/theme.js"></script>
<script src="/purchase.js"></script>
</body>
</html>
