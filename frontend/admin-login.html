<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - API Tool</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #031126 0%, #071a35 45%, #041225 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            color: white;
        }

        .auth-card h1 {
            margin: 0 0 8px;
        }

        .auth-card p {
            margin: 0 0 20px;
            color: #94a3b8;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #111827;
            color: white;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .bottom-links {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .bottom-links a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
        }

        .msg {
            margin-top: 14px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }

        .error {
            color: #ef4444;
        }

        .success {
            color: #22c55e;
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <h1>Admin Login</h1>
        <p>Access admin control panel</p>

        <form id="adminLoginForm">
            <div class="field">
                <label for="adminRole">Admin Role</label>
                <select id="adminRole">
                    <option value="super_admin">Super Admin</option>
                    <option value="cms_admin">CMS Admin</option>
                    <option value="pricing_admin">Pricing Admin</option>
                </select>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter admin email" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="submit-btn">Login</button>
        </form>

        <div id="messageBox" class="msg"></div>

        <div class="bottom-links">
            <a href="http://127.0.0.1:5000/page/home">← Back to Home</a>
        </div>
    </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:5000";
const ADMIN_BASE = window.location.origin;

const adminLoginForm = document.getElementById("adminLoginForm");
const messageBox = document.getElementById("messageBox");

function showMessage(message, type = "error") {
    messageBox.className = `msg ${type}`;
    messageBox.textContent = message;
}

adminLoginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const adminRole = document.getElementById("adminRole").value;
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
        const response = await fetch(`${API_BASE}/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password,
                login_as: "admin"
            })
        });

        const data = await response.json();

        if (!response.ok) {
            showMessage(data.error || "Login failed", "error");
            return;
        }

        if ((data.user.admin_role || "") !== adminRole) {
            showMessage("This account is not the selected admin role", "error");
            return;
        }

        localStorage.setItem("token", data.access_token);
        localStorage.setItem("loggedInUser", JSON.stringify(data.user));

        if (data.user.admin_role === "cms_admin") {
            window.location.href = `${ADMIN_BASE}/cms.html`;
        } else if (data.user.admin_role === "pricing_admin") {
            window.location.href = `${ADMIN_BASE}/admin-pricing.html`;
        } else {
            window.location.href = `${ADMIN_BASE}/admin.html`;
        }

    } catch (error) {
    console.error(error);
    showMessage("app.py server is not running on port 5000", "error");
    }
});
</script>
</body>
</html>
