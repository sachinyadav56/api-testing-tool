<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - API Tool</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1 id="formTitle">Welcome Back</h1>
            <p class="subtitle" id="formSubtitle">Please enter your details to login.</p>

            <form id="authForm">
                <div class="input-group" id="usernameGroup" style="display: none;">
                    <input type="text" id="username" placeholder="Enter username">
                </div>

                <div class="input-group">
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn" id="submitBtn">Login</button>
            </form>

            <p id="messageBox" style="margin-top: 14px;"></p>

            <p class="toggle-text" style="margin-top: 20px;">
                <span id="toggleText">Don't have an account?</span>
                <span class="toggle-link" id="toggleModeBtn">Register</span>
            </p>

            <p style="margin-top: 18px;">
                <a href="/page/home" class="toggle-link" style="text-decoration:none;">← Back to Home</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const authForm = document.getElementById("authForm");
        const usernameGroup = document.getElementById("usernameGroup");
        const usernameInput = document.getElementById("username");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const submitBtn = document.getElementById("submitBtn");
        const toggleModeBtn = document.getElementById("toggleModeBtn");
        const toggleText = document.getElementById("toggleText");
        const formTitle = document.getElementById("formTitle");
        const formSubtitle = document.getElementById("formSubtitle");
        const messageBox = document.getElementById("messageBox");

        let isLogin = true;

        function setMessage(text, type = "error") {
            messageBox.textContent = text;
            messageBox.className = type === "success" ? "success" : "error";
        }

        function clearMessage() {
            messageBox.textContent = "";
            messageBox.className = "";
        }

        function updateMode() {
            clearMessage();

            if (isLogin) {
                formTitle.textContent = "Welcome Back";
                formSubtitle.textContent = "Please enter your details to login.";
                submitBtn.textContent = "Login";
                toggleText.textContent = "Don't have an account?";
                toggleModeBtn.textContent = "Register";
                usernameGroup.style.display = "none";
                usernameInput.required = false;
            } else {
                formTitle.textContent = "Create Account";
                formSubtitle.textContent = "Register to start using API Tool.";
                submitBtn.textContent = "Register";
                toggleText.textContent = "Already have an account?";
                toggleModeBtn.textContent = "Login";
                usernameGroup.style.display = "block";
                usernameInput.required = true;
            }
        }

        toggleModeBtn.addEventListener("click", () => {
            isLogin = !isLogin;
            authForm.reset();
            updateMode();
        });

        authForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            clearMessage();

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const username = usernameInput.value.trim();

            if (!email || !password || (!isLogin && !username)) {
                setMessage("Please fill all required fields.");
                return;
            }

            const endpoint = isLogin ? "/login" : "/register";
            const payload = isLogin
                ? { email, password }
                : { username, email, password };

            submitBtn.disabled = true;
            submitBtn.textContent = isLogin ? "Logging in..." : "Registering...";

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    setMessage(data.error || "Something went wrong.");
                    return;
                }

                if (isLogin && data.user) {
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("loggedInUser", JSON.stringify(data.user));

                    setMessage("Login successful. Redirecting...", "success");

                    setTimeout(() => {
                        if (data.user.is_admin) {
                            window.location.href = "/admin.html";
                        } else {
                            window.location.href = "/dashboard.html";
                        }
                    }, 700);
                } else {
                    setMessage("Registration successful. Please login now.", "success");
                    isLogin = true;
                    authForm.reset();
                    updateMode();
                }
            } catch (error) {
                setMessage("Network error. Please try again.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? "Login" : "Register";
            }
        });

        updateMode();
    </script>
</body>
</html>
