<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - API Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1 id="formTitle">Welcome Back</h1>
            <p class="subtitle" id="formSubtitle">Please enter your details to login.</p>

            <div id="usernameField" class="input-group" style="display:none;">
                <input type="text" id="username" placeholder="Username">
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>

            <button id="mainBtn" class="btn">Login</button>

            <p id="authMessage"></p>

            <p class="toggle-text">
                <span id="toggleQuestion">Don't have an account?</span>
                <span class="toggle-link" id="toggleAction">Register</span>
            </p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let isLogin = true;

        const mainBtn = document.getElementById("mainBtn");
        const toggleAction = document.getElementById("toggleAction");
        const usernameField = document.getElementById("usernameField");
        const formTitle = document.getElementById("formTitle");
        const formSubtitle = document.getElementById("formSubtitle");
        const toggleQuestion = document.getElementById("toggleQuestion");
        const msg = document.getElementById("authMessage");

        toggleAction.addEventListener("click", () => {
            isLogin = !isLogin;
            usernameField.style.display = isLogin ? "none" : "block";
            formTitle.textContent = isLogin ? "Welcome Back" : "Create Account";
            formSubtitle.textContent = isLogin
                ? "Please enter your details to login."
                : "Join us to start using the API tool.";
            mainBtn.textContent = isLogin ? "Login" : "Register";
            toggleQuestion.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleAction.textContent = isLogin ? "Register" : "Login";
            msg.textContent = "";
            msg.className = "";
        });

        async function submitAuth() {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if ((!isLogin && !username) || !email || !password) {
                msg.textContent = "Please fill all required fields.";
                msg.className = "error";
                return;
            }

            const endpoint = isLogin ? "/login" : "/register";
            const payload = isLogin ? { email, password } : { username, email, password };

            msg.textContent = "Processing...";
            msg.className = "";

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLogin && data.user) {
                        localStorage.setItem("token", data.access_token);
                        localStorage.setItem("loggedInUser", JSON.stringify(data.user));
                        window.location.href = "index.html";
                    } else {
                        msg.textContent = data.message || "Registration successful. Please login.";
                        msg.className = "success";
                    }
                } else {
                    msg.textContent = data.error || "An error occurred";
                    msg.className = "error";
                }
            } catch (err) {
                msg.textContent = "Could not connect to server.";
                msg.className = "error";
            }
        }

        mainBtn.addEventListener("click", submitAuth);
    </script>
</body>
</html>
