<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchases - API Tool</title>
<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(14,165,233,0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(20,184,166,0.12), transparent 26%),
        linear-gradient(180deg, #03111f 0%, #071224 100%);
    color: #f8fafc;
}
.page-wrap {
    max-width: 1320px;
    margin: auto;
    padding: 24px;
}
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    background: rgba(10, 18, 32, 0.82);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 22px;
    padding: 22px 24px;
    margin-bottom: 22px;
}
.topbar h1 { margin: 0 0 6px; font-size: 28px; }
.topbar p { margin: 0; color: #94a3b8; }
.topbar-links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.topbar-links a,
.topbar-links button {
    text-decoration: none;
    border: none;
    background: #13203a;
    color: #f8fafc;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
}
.topbar-links a:hover,
.topbar-links button:hover {
    background: #1d4ed8;
}
.hero {
    background: linear-gradient(135deg, #0ea5e9, #14b8a6);
    border-radius: 24px;
    padding: 28px;
    margin-bottom: 22px;
}
.hero h2 { margin: 0 0 8px; font-size: 32px; }
.hero p { margin: 0; color: rgba(255,255,255,0.92); }
.card {
    background: rgba(19, 32, 58, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 24px;
    padding: 24px;
}
.table-wrap {
    overflow-x: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 14px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
th { color: #94a3b8; }
.badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
}
.badge.active {
    background: rgba(34, 197, 94, 0.14);
    color: #22c55e;
}
.badge.pending {
    background: rgba(245, 158, 11, 0.14);
    color: #fbbf24;
}
.badge.expired {
    background: rgba(239, 68, 68, 0.14);
    color: #ef4444;
}
.action-btn {
    border: none;
    background: #ef4444;
    color: white;
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
}
.action-btn:hover {
    background: #dc2626;
}
.empty {
    color: #94a3b8;
    text-align: center;
    padding: 18px 0;
}
@media (max-width: 700px) {
    .page-wrap {
        padding: 16px;
    }
}
</style>
</head>
<body>
<div class="page-wrap">
    <div class="topbar">
        <div>
            <h1>Purchases</h1>
            <p>View and manage all user purchases</p>
        </div>
        <div class="topbar-links">
            <button id="themeToggle">🌙 Dark</button>
            <a href="/admin.html">Dashboard</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </div>

    <section class="hero">
        <h2>Purchase Management</h2>
        <p>See purchases and remove expired plans.</p>
    </section>

    <section class="card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Plan</th>
                        <th>Ammount</th>
                        <th>Status</th>
                        <th>Start</th>
                        <th>Expiry</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="purchasesTableBody">
                    <tr><td colspan="7" class="empty">Loading purchases...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

<script src="/theme.js"></script>
<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/admin-login.html";
}

document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = "/admin-login.html";
});

async function loadPurchases() {
    const tbody = document.getElementById("purchasesTableBody");

    try {
        const response = await fetch(`${API_BASE}/admin/purchases`, {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const data = await response.json();
        tbody.innerHTML = "";

        if (!response.ok) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty">${data.error || "Failed to load purchases"}</td></tr>`;
            return;
        }

        if (!Array.isArray(data) || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty">No purchases found</td></tr>`;
            return;
        }

        data.forEach(item => {
            const statusClass =
                item.status === "active" ? "active" :
                item.status === "expired" ? "expired" : "pending";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${item.username || "-"}</td>
                <td>${item.plan_name || "-"}</td>
                <td>${item.amount || "-"}</td>
                <td><span class="badge ${statusClass}">${item.status || "-"}</span></td>
                <td>${item.start_date || "-"}</td>
                <td>${item.expiry_date || "-"}</td>
                <td><button class="action-btn" onclick="removePurchase(${item.id})">Remove</button></td>
            `;
            tbody.appendChild(tr);
        });
    } catch (error) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty">Failed to load purchases</td></tr>`;
    }
}

async function removePurchase(purchaseId) {
    if (!confirm("Remove this purchase?")) return;

    try {
        const response = await fetch(`${API_BASE}/admin/purchases/remove/${purchaseId}`, {
            method: "DELETE",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const data = await response.json();

        if (!response.ok) {
            alert(data.error || "Failed to remove purchase");
            return;
        }

        loadPurchases();
    } catch (error) {
        alert("Something went wrong");
    }
}

loadPurchases();
</script>
</body>
</html>
