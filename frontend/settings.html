<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - API Tool</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="admin-page-wrapper">
    <div class="admin-container">

        <div class="page-topbar">
            <div>
                <h1>Settings</h1>
                <p>Manage your profile and password</p>
            </div>

            <div class="topbar-links">
                <a href="#" id="themeToggle">🌙 Dark</a>
                <a href="#" id="backLink">Back</a>
                
            </div>
        </div>

        <div class="main-grid">
            <section class="card">
                <h2>Update Profile</h2>

                <label for="settingsUsername">Username</label>
                <input type="text" id="settingsUsername" placeholder="Enter username">

                <label for="settingsEmail">Email</label>
                <input type="email" id="settingsEmail" placeholder="Enter email">

                <div class="button-group" style="margin-top:16px;">
                    <button id="saveProfileBtn" type="button">Save Profile</button>
                </div>
            </section>

            <section class="card">
                <h2>Change Password</h2>

                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" placeholder="Enter current password">

                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password">

                <div class="button-group" style="margin-top:16px;">
                    <button id="changePasswordBtn" type="button">Change Password</button>
                </div>
            </section>
        </div>

    </div>
</div>

<script src="/theme.js"></script>

<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem("token");
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

if (!token || !loggedInUser) {
    window.location.href = "/login.html";
}

function authHeaders() {
    return {
        "Authorization": `Bearer ${token}`
    };
}

function authJsonHeaders() {
    return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
    };
}

function ensureToastContainer() {
    let container = document.getElementById("toastContainer");
    if (!container) {
        container = document.createElement("div");
        container.id = "toastContainer";
        container.className = "toast-container";
        document.body.appendChild(container);
    }
    return container;
}

function showToast(message, type = "success") {
    const container = ensureToastContainer();
    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
        <span class="toast-icon">${type === "success" ? "✓" : "✕"}</span>
        <span class="toast-text">${message}</span>
        <button class="toast-close" type="button">&times;</button>
    `;

    toast.querySelector(".toast-close").addEventListener("click", () => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 250);
    });

    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add("show"));

    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 250);
    }, 3000);
}

async function loadProfile() {
    try {
        const response = await fetch(`${API_BASE}/me/subscription`, {
            headers: authHeaders()
        });

        const data = await response.json();

        if (!response.ok) {
            showToast(data.error || "Failed to load profile", "error");
            return;
        }

        document.getElementById("settingsUsername").value = data.username || "";
        document.getElementById("settingsEmail").value = data.email || "";
    } catch (error) {
        showToast("Failed to load profile", "error");
    }
}

async function saveProfile() {
    const username = document.getElementById("settingsUsername").value.trim();
    const email = document.getElementById("settingsEmail").value.trim();

    if (!username || !email) {
        showToast("Please fill all fields", "error");
        return;
    }

    try {
        const response = await fetch(`${API_BASE}/me/profile`, {
            method: "PUT",
            headers: authJsonHeaders(),
            body: JSON.stringify({ username, email })
        });

        const data = await response.json();

        if (!response.ok) {
            showToast(data.error || "Failed to update profile", "error");
            return;
        }

        localStorage.setItem("loggedInUser", JSON.stringify({
            ...loggedInUser,
            username,
            email
        }));

        showToast(data.message || "Profile updated successfully", "success");
    } catch (error) {
        showToast("Failed to update profile", "error");
    }
}

async function changePassword() {
    const current_password = document.getElementById("currentPassword").value.trim();
    const new_password = document.getElementById("newPassword").value.trim();

    if (!current_password || !new_password) {
        showToast("Please fill all password fields", "error");
        return;
    }

    try {
        const response = await fetch(`${API_BASE}/me/password`, {
            method: "PUT",
            headers: authJsonHeaders(),
            body: JSON.stringify({ current_password, new_password })
        });

        const data = await response.json();

        if (!response.ok) {
            showToast(data.error || "Failed to change password", "error");
            return;
        }

        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        showToast(data.message || "Password changed successfully", "success");
    } catch (error) {
        showToast("Failed to change password", "error");
    }
}

window.addEventListener("DOMContentLoaded", () => {
    const backLink = document.getElementById("backLink");
    backLink.href = loggedInUser.is_admin ? "/admin.html" : "/dashboard.html";
    backLink.textContent = loggedInUser.is_admin ? "Admin Dashboard" : "User Dashboard";

    loadProfile();

    document.getElementById("saveProfileBtn").addEventListener("click", saveProfile);
    document.getElementById("changePasswordBtn").addEventListener("click", changePassword);

    document.getElementById("logoutBtn").addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.clear();
        window.location.href = "/login.html";
    });
});
</script>
</body>
</html>
