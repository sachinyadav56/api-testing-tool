<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queries - Admin Panel</title>
<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg, #020617, #06101d);
    color: #f8fafc;
}

.page-wrap {
    max-width: 1300px;
    margin: auto;
    padding: 24px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 20px 24px;
    margin-bottom: 22px;
}

.topbar h1 {
    margin: 0 0 6px;
    font-size: 28px;
}

.topbar p {
    margin: 0;
    color: #94a3b8;
}

.topbar-links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.topbar-links a,
.topbar-links button {
    text-decoration: none;
    border: none;
    background: #13203a;
    color: #f8fafc;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
}

.topbar-links a:hover,
.topbar-links button:hover {
    background: #1d4ed8;
}

.hero {
    background: linear-gradient(135deg, #0ea5e9, #14b8a6);
    border-radius: 22px;
    padding: 28px;
    margin-bottom: 22px;
}

.hero h2 {
    margin: 0 0 8px;
    font-size: 32px;
}

.hero p {
    margin: 0;
    color: rgba(255,255,255,0.92);
}

.card {
    background: #13203a;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 20px;
}

.table-wrap {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 14px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    vertical-align: top;
}

th {
    color: #94a3b8;
    font-size: 14px;
}

td {
    color: #f8fafc;
}

.badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
}

.badge.pending {
    background: rgba(245, 158, 11, 0.14);
    color: #fbbf24;
}

.badge.solved {
    background: rgba(34, 197, 94, 0.14);
    color: #22c55e;
}

.action-btn {
    border: none;
    background: #06b6d4;
    color: white;
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
}

.action-btn:hover {
    background: #0891b2;
}

.empty-box {
    padding: 28px;
    text-align: center;
    color: #94a3b8;
}

@media (max-width: 800px) {
    .page-wrap {
        padding: 16px;
    }
}
</style>
</head>
<body>
<div class="page-wrap">
    <div class="topbar">
        <div>
            <h1>Queries</h1>
            <p>View and manage user support queries</p>
        </div>

        <div class="topbar-links">
            <button id="themeToggle">🌙 Dark</button>
            <a href="/admin.html">Dashboard</a>
            <a href="/notifications.html">Notifications</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </div>

    <section class="hero">
        <h2>User Query Management</h2>
        <p>Track submitted queries and update their status.</p>
    </section>

    <section class="card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Subject</th>
                        <th>Message</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="queriesTableBody">
                    <tr>
                        <td colspan="7" class="empty-box">Loading queries...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

<script src="/theme.js"></script>
<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/admin-login.html";
}

document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = "/admin-login.html";
});

async function loadQueries() {
    const tbody = document.getElementById("queriesTableBody");

    try {
        const response = await fetch(`${API_BASE}/admin/queries`, {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const data = await response.json();
        tbody.innerHTML = "";

        if (!response.ok) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-box">${data.error || "Failed to load queries"}</td></tr>`;
            return;
        }

        if (!Array.isArray(data) || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-box">No queries found</td></tr>`;
            return;
        }

        data.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${item.name || "-"}</td>
                <td>${item.email || "-"}</td>
                <td>${item.subject || "-"}</td>
                <td>${item.message || "-"}</td>
                <td>
                    <span class="badge ${item.status === "solved" ? "solved" : "pending"}">
                        ${item.status || "pending"}
                    </span>
                </td>
                <td>${item.created_at || "-"}</td>
                <td>
                    ${item.status === "solved"
                        ? "-"
                        : `<button class="action-btn" onclick="markSolved(${item.id})">Mark Solved</button>`
                    }
                </td>
            `;
            tbody.appendChild(tr);
        });
    } catch (error) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-box">Failed to load queries</td></tr>`;
    }
}

async function markSolved(queryId) {
    try {
        const response = await fetch(`${API_BASE}/admin/queries/${queryId}/solve`, {
            method: "PUT",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const data = await response.json();

        if (!response.ok) {
            alert(data.error || "Failed to update query");
            return;
        }

        loadQueries();
    } catch (error) {
        alert("Something went wrong");
    }
}

loadQueries();
</script>
</body>
</html>
