<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - API Tool</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="admin-page-wrapper">
    <div class="admin-container">

        <div class="page-topbar">
            <div>
                <h1>Notifications</h1>
                <p>Your latest alerts and updates</p>
            </div>

            <div class="topbar-links">
                <a href="#" id="themeToggle">🌙 Dark</a>
                <a href="#" id="backLink">Back</a>
                <a href="#" id="logoutBtn" class="logout-link">Logout</a>
            </div>
        </div>

        <section class="card">
            <div id="notificationsList">
                <p>Loading notifications...</p>
            </div>
        </section>

    </div>
</div>

<script src="/theme.js"></script>

<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem("token");
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

if (!token || !loggedInUser) {
    window.location.href = "/login.html";
}

function authHeaders() {
    return {
        "Authorization": `Bearer ${token}`
    };
}

function ensureToastContainer() {
    let container = document.getElementById("toastContainer");
    if (!container) {
        container = document.createElement("div");
        container.id = "toastContainer";
        container.className = "toast-container";
        document.body.appendChild(container);
    }
    return container;
}

function showToast(message, type = "success") {
    const container = ensureToastContainer();
    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
        <span class="toast-icon">${type === "success" ? "✓" : "✕"}</span>
        <span class="toast-text">${message}</span>
        <button class="toast-close" type="button">&times;</button>
    `;

    toast.querySelector(".toast-close").addEventListener("click", () => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 250);
    });

    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add("show"));

    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 250);
    }, 2500);
}

async function loadNotifications() {
    try {
        const response = await fetch(`${API_BASE}/notifications`, {
            headers: authHeaders()
        });

        const data = await response.json();
        const list = document.getElementById("notificationsList");
        list.innerHTML = "";

        if (!response.ok) {
            list.innerHTML = `<p>${data.error || "Failed to load notifications"}</p>`;
            return;
        }

        if (!Array.isArray(data) || data.length === 0) {
            list.innerHTML = `<p>No notifications found.</p>`;
            return;
        }

        data.forEach(item => {
            const box = document.createElement("div");
            box.className = Number(item.is_read) === 0
                ? "overview-item notification-unread"
                : "overview-item notification-read";

            box.style.marginBottom = "12px";

            box.innerHTML = `
                <div>
                    <strong style="font-size:18px;">${item.title || "Notification"}</strong>
                    <p style="margin:6px 0 0;">${item.message || ""}</p>
                    <small style="color:var(--text-soft);">${item.created_at || ""}</small>
                </div>
                <div>
                    ${
                        Number(item.is_read) === 1
                            ? `<span class="role-user">Read</span>`
                            : `<button type="button" class="mark-read-btn" data-id="${item.id}">Mark Read</button>`
                    }
                </div>
            `;

            list.appendChild(box);
        });

        document.querySelectorAll(".mark-read-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const id = btn.dataset.id;

                try {
                    const response = await fetch(`${API_BASE}/notifications/${id}/read`, {
                        method: "PUT",
                        headers: authHeaders()
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        showToast(data.error || "Failed to mark as read", "error");
                        return;
                    }

                    loadNotifications();
                } catch (error) {
                    showToast("Failed to mark notification as read", "error");
                }
            });
        });

    } catch (error) {
        document.getElementById("notificationsList").innerHTML =
            `<p>Failed to load notifications.</p>`;
    }
}

window.addEventListener("DOMContentLoaded", () => {
    const backLink = document.getElementById("backLink");
    backLink.href = loggedInUser.is_admin ? "/admin.html" : "/dashboard.html";
    backLink.textContent = loggedInUser.is_admin ? "Admin Dashboard" : "User Dashboard";

    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
        logoutBtn.addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = "/login.html";
        });
    }

    loadNotifications();
});
</script>
</body>
</html>
