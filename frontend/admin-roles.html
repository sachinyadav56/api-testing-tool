<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Role Management</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .page-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .topbar-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .topbar-links a {
            text-decoration: none;
            color: inherit;
            font-weight: 600;
        }

        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 18px;
            color: white;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #243041;
            text-align: left;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #111827;
            color: white;
            box-sizing: border-box;
        }

        .save-btn,
        .delete-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .save-btn {
            background: #2563eb;
            color: #fff;
        }

        .delete-btn {
            background: #ef4444;
            color: #fff;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(37, 99, 235, 0.18);
            color: #93c5fd;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="topbar">
        <div>
            <h1>Admin Role Management</h1>
            <p>Only super admin can assign CMS admin and Pricing admin</p>
        </div>

        <div class="topbar-links">
            <a href="/admin.html">Dashboard</a>
            
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </div>

    <div class="card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Current Role</th>
                        <th>Assign Role</th>
                        <th>Save</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="6">Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem("token");
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");

if (!token) {
    window.location.href = "/login.html";
}

if (!loggedInUser.is_admin || loggedInUser.admin_role !== "super_admin") {
    alert("Only super admin can open this page");
    window.location.href = "/admin.html";
}

function authHeaders(withJson = false) {
    if (withJson) {
        return {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        };
    }

    return {
        "Authorization": `Bearer ${token}`
    };
}

function roleText(role) {
    if (!role) return "User";
    if (role === "super_admin") return "Super Admin";
    if (role === "cms_admin") return "CMS Admin";
    if (role === "pricing_admin") return "Pricing Admin";
    return role;
}

async function loadUsers() {
    try {
        const response = await fetch(`${API_BASE}/users`, {
            headers: authHeaders()
        });

        const data = await response.json();
        const tbody = document.getElementById("usersTableBody");
        tbody.innerHTML = "";

        if (!response.ok) {
            tbody.innerHTML = `<tr><td colspan="6">${data.error || "Failed to load users"}</td></tr>`;
            return;
        }

        if (!Array.isArray(data) || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6">No users found</td></tr>`;
            return;
        }

        data.forEach(user => {
            const tr = document.createElement("tr");
            const isSelf = Number(user.id) === Number(loggedInUser.id);

            tr.innerHTML = `
                <td><input type="text" class="username-input" value="${user.username || ""}"></td>
                <td><input type="email" class="email-input" value="${user.email || ""}"></td>
                <td><span class="badge">${roleText(user.admin_role || "")}</span></td>
                <td>
                    <select class="role-select" ${isSelf ? "disabled" : ""}>
                        <option value="" ${!user.admin_role ? "selected" : ""}>User</option>
                        <option value="cms_admin" ${user.admin_role === "cms_admin" ? "selected" : ""}>CMS Admin</option>
                        <option value="pricing_admin" ${user.admin_role === "pricing_admin" ? "selected" : ""}>Pricing Admin</option>
                        <option value="super_admin" ${user.admin_role === "super_admin" ? "selected" : ""}>Super Admin</option>
                    </select>
                </td>
                <td><button class="save-btn">Save</button></td>
                <td>${isSelf ? "-" : '<button class="delete-btn">Delete</button>'}</td>
            `;

            const saveBtn = tr.querySelector(".save-btn");
            saveBtn.addEventListener("click", async () => {
                const username = tr.querySelector(".username-input").value.trim();
                const email = tr.querySelector(".email-input").value.trim();
                const admin_role = tr.querySelector(".role-select").value;

                const res = await fetch(`${API_BASE}/users/${user.id}`, {
                    method: "PUT",
                    headers: authHeaders(true),
                    body: JSON.stringify({
                        username,
                        email,
                        admin_role
                    })
                });

                const result = await res.json();

                if (!res.ok) {
                    alert(result.error || "Failed to update user");
                    return;
                }

                alert(result.message || "User updated successfully");
                loadUsers();
            });

            const deleteBtn = tr.querySelector(".delete-btn");
            if (deleteBtn) {
                deleteBtn.addEventListener("click", async () => {
                    if (!confirm("Delete this user?")) return;

                    const res = await fetch(`${API_BASE}/users/${user.id}`, {
                        method: "DELETE",
                        headers: authHeaders()
                    });

                    const result = await res.json();

                    if (!res.ok) {
                        alert(result.error || "Failed to delete user");
                        return;
                    }

                    alert(result.message || "User deleted successfully");
                    loadUsers();
                });
            }

            tbody.appendChild(tr);
        });

    } catch (error) {
        document.getElementById("usersTableBody").innerHTML =
            `<tr><td colspan="6">Failed to load users</td></tr>`;
    }
}

document.getElementById("logoutBtn").addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = "/login.html";
});

loadUsers();
</script>
</body>
</html>
